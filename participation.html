<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#020617">
  <meta name="msapplication-navbutton-color" content="#020617">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>STOLAR CARP • Учасники змагання</title>

  <link rel="stylesheet" href="assets/css/main.css">

  <style>
    body{ background:#020617; }
    .wrap{ max-width:980px; margin:0 auto; padding:18px 12px 80px; }

    .header{
      position:sticky; top:0; z-index:20;
      backdrop-filter: blur(10px);
      background: rgba(2,6,23,.65);
      border-bottom: 1px solid rgba(148,163,184,.12);
      padding:10px 12px;
    }

    .headerInner{
      max-width:980px;
      margin:0 auto;
      display:flex;
      align-items:center;
    }

    .btnBack{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:14px;
      text-decoration:none;
      color:#e5e7eb;
      border:1px solid rgba(148,163,184,.22);
      background:rgba(15,23,42,.55);
    }

    .pageTitle{
      margin:18px 0 8px;
      text-align:center;
      font-weight:950;
      letter-spacing:.6px;
      line-height:1.15;
      font-size:1.9rem;
      background:linear-gradient(90deg,#facc15 0%, #7f1d1d 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      -webkit-text-fill-color:transparent;
    }

    .pageSub{
      text-align:center;
      color:#94a3b8;
      font-weight:800;
      margin-bottom:14px;
    }

    .list{
      margin-top:8px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .row{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 4px;
      border-bottom:1px solid rgba(148,163,184,.16);
      cursor:pointer;
      transition:background .2s;
      border-radius:8px;
    }

    .row:hover{ background:rgba(250,204,21,.05); }

    .lamp{
      width:10px;
      height:10px;
      border-radius:999px;
      flex:0 0 10px;
      box-shadow: 0 0 0 3px rgba(255,255,255,.03);
    }

    .lamp--green{ background:#22c55e; }
    .lamp--red{ background:#ef4444; }

    .idx{
      width:32px;
      text-align:right;
      color:#94a3b8;
      font-weight:900;
      flex:0 0 32px;
    }

    .name{
      flex:1;
      min-width:0;
      color:#e5e7eb;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .status{
      flex:0 0 auto;
      font-weight:900;
      white-space:nowrap;
      color:#94a3b8;
    }

    .status--paid{ color:#22c55e; }
    .status--unpaid{ color:#ef4444; }

    .mutedCenter{
      text-align:center;
      color:#94a3b8;
      font-weight:800;
      margin-top:14px;
    }

    .dividerLabel{
      margin-top:14px;
      color:#94a3b8;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.08em;
      font-size:.85rem;
    }

    .mealBox{
      margin:10px 0 12px;
      padding:14px;
      border-radius:18px;
      border:1px solid rgba(250,204,21,.35);
      background:
        radial-gradient(circle at top left,rgba(250,204,21,.12),transparent 38%),
        rgba(15,23,42,.65);
      box-shadow:0 16px 34px rgba(0,0,0,.35);
    }

    .mealHead{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:10px;
    }

    .mealTitle{
      font-weight:950;
      color:#facc15;
      letter-spacing:.04em;
    }

    .mealActions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .mealBtn{
      border:1px solid rgba(148,163,184,.24);
      background:#0f172a;
      color:#e5e7eb;
      border-radius:14px;
      padding:10px 12px;
      font-weight:900;
      cursor:pointer;
      font-size:.9rem;
    }

    .mealBtn--primary{
      border:none;
      background:linear-gradient(90deg,#facc15,#f97316);
      color:#111827;
    }

    .mealBtn--danger{
      border:none;
      background:linear-gradient(90deg,#ef4444,#991b1b);
      color:#fff;
    }

    .mealBtn[hidden]{ display:none !important; }

    .mealStatus{
      color:#94a3b8;
      font-size:.85rem;
      margin-top:8px;
      min-height:18px;
    }

    .mealStatus.ok{ color:#22c55e; }
    .mealStatus.err{ color:#ef4444; }

    #mealPopup{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.92);
      backdrop-filter:blur(6px);
      z-index:10000;
      align-items:center;
      justify-content:center;
      padding:4px;
    }

    #mealPopupContent{
      width:100%;
      max-width:100%;
      max-height:96vh;
      overflow:auto;
      background:#0f172a;
      border:1px solid #1f2937;
      border-radius:12px;
      box-shadow:0 26px 70px rgba(0,0,0,.75);
    }

    #mealPopupHeader{
      position:sticky;
      top:0;
      z-index:2;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:8px 10px;
      border-bottom:1px solid #1f2937;
      background:#0f172a;
    }

    #mealPopupTitle{
      color:#facc15;
      font-weight:950;
      font-size:.9rem;
    }

    #mealPopupClose{
      background:none;
      border:none;
      color:#94a3b8;
      font-size:1.35rem;
      cursor:pointer;
      width:30px;
      height:30px;
      border-radius:10px;
    }

    #mealPopupClose:hover{
      background:#1f2937;
      color:#e5e7eb;
    }

    #mealPopupBody{ padding:4px; }

    .mealGrid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px;
      margin:10px 0 14px;
    }

    .mealField{
      background:#020617;
      border:1px solid #1f2937;
      border-radius:14px;
      padding:10px;
    }

    .mealField label{
      display:block;
      color:#94a3b8;
      font-size:.8rem;
      margin-bottom:6px;
      font-weight:800;
    }

    .mealField input,
    .mealField textarea{
      width:100%;
      background:#0b1220;
      border:1px solid #374151;
      color:#e5e7eb;
      border-radius:12px;
      padding:10px;
      outline:none;
      font-weight:800;
    }

    .mealField textarea{
      min-height:80px;
      resize:vertical;
      font-weight:600;
    }

    .mealDayTitle{
      color:#e5e7eb;
      font-weight:950;
      margin:14px 0 6px;
    }

    .mealScreenTableWrap{
      width:100%;
      overflow:visible;
    }

    .mealScreenTable{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
      font-size:8px;
      line-height:1.02;
    }

    .mealScreenTable th,
    .mealScreenTable td{
      border:1px solid rgba(148,163,184,.18);
      padding:1px;
      text-align:center;
      color:#e5e7eb;
      white-space:nowrap;
      height:17px;
    }

    .mealScreenTable th{
      background:#020617;
      color:#facc15;
      font-weight:950;
      font-size:8px;
    }

    .mealScreenTable td{
      background:#0b1120;
      font-weight:800;
    }

    .mealScreenTable .m-sector{
      color:#facc15;
      font-weight:950;
    }

    .mealScreenTable .m-team{
      text-align:center;
      overflow:hidden;
      text-overflow:ellipsis;
      font-size:7px;
      max-width:70px;
    }

    .mealScreenTable th:nth-child(1),
    .mealScreenTable td:nth-child(1){
      width:40px;
    }

    .mealScreenTable th:nth-child(2),
    .mealScreenTable td:nth-child(2){
      width:auto;
    }

    .mealScreenTable td:nth-child(2){
      text-align:center;
    }

    .mealScreenTable th:nth-child(n+3),
    .mealScreenTable td:nth-child(n+3){
      width:28px;
    }

    .mealScreenTable tfoot td{
      background:#1e293b;
      color:#facc15;
      font-weight:950;
      height:18px;
    }

    @media(max-width:720px){
      .mealHead{ flex-direction:column; }
      .mealActions{ width:100%; }
      .mealBtn{ flex:1 1 auto; }
      .mealGrid{ grid-template-columns:1fr; }
    }

    #teamPopup{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.9);
      backdrop-filter:blur(6px);
      z-index:9999;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    #teamPopupContent{
      background:#0f172a;
      border-radius:18px;
      border:1px solid #1f2937;
      max-width:500px;
      width:100%;
      max-height:80vh;
      overflow-y:auto;
      box-shadow:0 25px 50px rgba(0,0,0,.8);
    }

    #teamPopupHeader{
      padding:16px;
      border-bottom:1px solid #1f2937;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    #teamPopupTitle{
      font-size:1.1rem;
      font-weight:800;
      color:#facc15;
    }

    #teamPopupClose{
      background:none;
      border:none;
      color:#94a3b8;
      font-size:1.5rem;
      cursor:pointer;
      padding:0;
      width:32px;
      height:32px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:8px;
      transition:all .2s;
    }

    #teamPopupClose:hover{
      background:#1f2937;
      color:#e5e7eb;
    }

    #teamPopupBody{ padding:16px; }

    .team-member{
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px 0;
      border-bottom:1px solid #1f2937;
    }

    .team-member:last-child{ border-bottom:none; }

    .member-avatar{
      width:50px;
      height:50px;
      border-radius:50%;
      overflow:hidden;
      border:2px solid #facc15;
      flex-shrink:0;
    }

    .member-avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .member-avatar-placeholder{
      width:100%;
      height:100%;
      background:#1f2937;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
    }

    .member-info{ flex:1; }

    .member-name{
      font-weight:800;
      color:#e5e7eb;
      margin-bottom:2px;
    }

    .member-role{
      font-size:.8rem;
      color:#94a3b8;
    }

    .team-loading{
      text-align:center;
      color:#94a3b8;
      padding:20px;
    }
  </style>
</head>

<body>
  <header class="header">
    <div class="headerInner">
      <a href="cabinet.html" class="btnBack">← Назад</a>
    </div>
  </header>

  <main class="wrap">
    <h1 id="pageTitle" class="pageTitle">Змагання</h1>
    <div id="pageSub" class="pageSub"></div>

    <div id="mealBox" class="mealBox">
      <div class="mealHead">
        <div>
          <div class="mealTitle">🍽 Харчування</div>
          <div id="mealStatus" class="mealStatus"></div>
        </div>

        <div id="mealActions" class="mealActions">
          <button
            id="btnOpenMealOrder"
            class="mealBtn mealBtn--primary"
            type="button"
            hidden
            onclick="window.scMeals && window.scMeals.openOrder()"
          >
            Подати / змінити заявку
          </button>

          <button
            id="btnOpenMealList"
            class="mealBtn"
            type="button"
            hidden
            onclick="window.scMeals && window.scMeals.openList()"
          >
            Список заявок
          </button>

          <button
            id="btnClearMealOrders"
            class="mealBtn mealBtn--danger"
            type="button"
            hidden
            onclick="window.scMeals && window.scMeals.clearOrders()"
          >
            Очистити харчування
          </button>
        </div>
      </div>
    </div>

    <div id="teamsList" class="list"></div>
    <div id="msg" class="mutedCenter"></div>
  </main>

  <div id="teamPopup">
    <div id="teamPopupContent">
      <div id="teamPopupHeader">
        <div id="teamPopupTitle">Склад команди</div>
        <button id="teamPopupClose" type="button">×</button>
      </div>
      <div id="teamPopupBody">
        <div class="team-loading">Завантаження…</div>
      </div>
    </div>
  </div>

  <div id="mealPopup">
    <div id="mealPopupContent">
      <div id="mealPopupHeader">
        <div id="mealPopupTitle">Харчування</div>
        <button id="mealPopupClose" type="button">×</button>
      </div>
      <div id="mealPopupBody">
        <div class="team-loading">Завантаження…</div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="assets/js/firebase-init.js?v=20260610-2"></script>
  <script src="assets/js/participation.js?v=20260610-7"></script>
  <script src="assets/js/meal_orders.js?v=20260611-2"></script>
</body>
</html>
