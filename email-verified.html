<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Новий пароль · STOLAR CARP</title>

  <link rel="stylesheet" href="assets/css/main.css" />

  <style>
    body{ background: radial-gradient(circle at top,#111827 0,#020617 55%); }
    .wrap{ max-width:560px; margin:0 auto; padding:70px 16px; }
    .card{
      padding:18px;
      border-radius:18px;
      background:rgba(15,23,42,.92);
      border:1px solid rgba(148,163,184,.35);
      box-shadow:0 18px 40px rgba(0,0,0,.6);
    }
    .muted{ color:#9ca3af; margin-bottom:14px; }
    .grid{ display:grid; gap:10px; }
    input{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.35);
      background:rgba(2,6,23,.55);
      color:#e5e7eb;
      outline:none;
    }
    .msg{ margin-top:12px; font-size:.95rem; }
    .msg.ok{ color:#22c55e; }
    .msg.err{ color:#ef4444; }
    .actions{ margin-top:14px; display:flex; gap:10px; flex-wrap:wrap; }
  </style>
</head>

<body>

<main class="wrap">
  <div class="card">
    <h1 class="section-title" style="margin:0 0 8px;">Встановити новий пароль</h1>
    <div class="muted">
      Введіть новий пароль для свого акаунта STOLAR CARP.
    </div>

    <form id="resetForm" class="grid">
      <input id="newPassword" type="password" placeholder="Новий пароль (мін. 6 символів)" required />
      <input id="repeatPassword" type="password" placeholder="Повторіть новий пароль" required />

      <div class="actions">
        <button class="btn btn--accent" id="resetBtn" type="submit">
          Змінити пароль
        </button>
        <a class="btn btn--primary" href="auth.html">До входу</a>
      </div>

      <div class="msg" id="msg"></div>
    </form>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="assets/js/firebase-init.js"></script>

<script>
(function () {
  const $ = (id) => document.getElementById(id);

  const form = $("resetForm");
  const msg = $("msg");
  const btn = $("resetBtn");

  function setMsg(text, type) {
    msg.textContent = text || "";
    msg.classList.remove("ok", "err");
    if (type) msg.classList.add(type);
  }

  async function waitFirebase(maxMs = 8000) {
    const t0 = Date.now();
    while (Date.now() - t0 < maxMs) {
      if (window.scAuth) return window.scAuth;
      await new Promise((r) => setTimeout(r, 50));
    }
    throw new Error("Firebase не готовий");
  }

  function friendlyError(err) {
    const code = String(err?.code || "");
    if (code === "auth/expired-action-code") return "Посилання застаріло. Запросіть відновлення пароля ще раз.";
    if (code === "auth/invalid-action-code") return "Посилання недійсне або вже використане.";
    if (code === "auth/weak-password") return "Пароль занадто слабкий. Мінімум 6 символів.";
    if (code === "auth/user-disabled") return "Акаунт вимкнено.";
    return err?.message || "Не вдалося змінити пароль.";
  }

  const params = new URLSearchParams(location.search);
  const oobCode = params.get("oobCode");

  if (!oobCode) {
    setMsg("Немає коду відновлення. Відкрийте посилання саме з листа.", "err");
    if (btn) btn.disabled = true;
    return;
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const p1 = $("newPassword").value || "";
    const p2 = $("repeatPassword").value || "";

    if (p1.length < 6) {
      setMsg("Пароль має бути мінімум 6 символів.", "err");
      return;
    }

    if (p1 !== p2) {
      setMsg("Паролі не співпадають.", "err");
      return;
    }

    try {
      btn.disabled = true;
      setMsg("Перевіряю посилання…", "");

      const auth = await waitFirebase();

      await auth.verifyPasswordResetCode(oobCode);

      setMsg("Змінюю пароль…", "");
      await auth.confirmPasswordReset(oobCode, p1);

      setMsg("✅ Пароль успішно змінено. Тепер можна увійти з новим паролем.", "ok");

      setTimeout(() => {
        location.href = "auth.html";
      }, 1800);

    } catch (err) {
      console.error(err);
      setMsg(friendlyError(err), "err");
      btn.disabled = false;
    }
  });
})();
</script>

</body>
</html>
